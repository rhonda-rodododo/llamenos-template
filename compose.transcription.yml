# Llámenos Co-op Cloud — Whisper transcription overlay
#
# Enable by adding to COMPOSE_FILE in app config:
#   COMPOSE_FILE="compose.yml:compose.transcription.yml"

version: "3.8"

services:
  app:
    environment:
      - WHISPER_URL=http://${STACK_NAME}_whisper:8080/v1/audio/transcriptions

  whisper:
    image: fedirz/faster-whisper-server:0.4.1
    networks:
      - internal
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
