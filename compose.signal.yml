# Llamenos Co-op Cloud — Signal messaging overlay
#
# Enable by adding to COMPOSE_FILE in app config:
#   COMPOSE_FILE="compose.yml:compose.signal.yml"

version: "3.8"

services:
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92
    networks:
      - internal
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  signal-data:
